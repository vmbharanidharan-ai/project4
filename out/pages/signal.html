<!DOCTYPE html>
<html lang="en" data-theme="paper">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>/signal</title>
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
<link href="https://fonts.bunny.net/css?family=big-shoulders-display:700,900|jetbrains-mono:400,500,700|fraunces:400i,900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0F0E0C;--paper:#ECE6D7;--primary:#E63E21;--signal:#8EE000;
  --f-display:"Big Shoulders Display",system-ui,sans-serif;
  --f-mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  --f-editorial:"Fraunces",Georgia,serif;
  --gutter:clamp(16px,3vw,40px);
  --ease-out:cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--f-mono);color:var(--ink);background:var(--paper);
  min-height:100vh;padding:var(--gutter);
  display:grid;place-items:center;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--primary);color:var(--paper)}

.grain{
  position:fixed;inset:0;pointer-events:none;z-index:9000;
  opacity:0.06;mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.06  0 0 0 0 0.055  0 0 0 0 0.047  0 0 0 1 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}

.wrap{
  max-width:640px;width:100%;display:grid;gap:36px;
}
.crumb{
  font-size:10px;letter-spacing:0.22em;text-transform:uppercase;opacity:0.45;
}
.crumb a{color:inherit;border-bottom:1px solid currentColor;padding-bottom:2px}

h1{
  font-family:var(--f-display);font-weight:900;
  font-size:clamp(56px,10vw,140px);line-height:0.88;letter-spacing:-0.04em;
  text-transform:uppercase;
}
h1 em{
  font-family:var(--f-editorial);font-style:italic;font-weight:400;
  color:var(--primary);text-transform:none;
}

.body{font-size:14px;line-height:1.7;max-width:50ch}
.body p+p{margin-top:14px}

.payload{
  margin-top:8px;padding:18px 20px;
  background:var(--ink);color:var(--signal);
  font-family:var(--f-mono);font-size:12px;line-height:1.6;
  border:1px solid rgba(236,230,215,0.15);
  overflow-x:auto;
}
.payload a{color:var(--signal);border-bottom:1px solid currentColor}

.meta{
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  opacity:0.4;padding-top:14px;border-top:1px solid rgba(15,14,12,0.1);
  display:flex;gap:24px;flex-wrap:wrap;
}

.wrap>*{opacity:0;transform:translateY(12px);animation:in 900ms var(--ease-out) forwards}
.wrap>*:nth-child(1){animation-delay:80ms}
.wrap>*:nth-child(2){animation-delay:200ms}
.wrap>*:nth-child(3){animation-delay:360ms}
.wrap>*:nth-child(4){animation-delay:520ms}
.wrap>*:nth-child(5){animation-delay:680ms}
@keyframes in{to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.wrap>*{animation:none;opacity:1;transform:none}}
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="wrap">
  <div class="crumb"><a href="/">← back</a> · signal · 01/01</div>
  <h1>the <em>signal</em><br>isn't here.</h1>
  <div class="body">
    <p>this page is a label. the payload lives one hop over.</p>
    <p>fetch it. decode it. the sequence wants to be letters.</p>
  </div>
  <div class="payload">
    <div>GET <a href="/signal.json">/signal.json</a></div>
    <div style="opacity:0.6;margin-top:6px"># returns: sequence + hint</div>
  </div>
  <div class="meta">
    <span>no ui</span>
    <span>read the data</span>
    <span>what do numbers become</span>
  </div>
</main>

<script>
// Behavior tracking + server-issued token
(function(){
  var TOKEN='L5_signal.1777250896999.f3014a8d1e32ca212535b9eb2b1e379e';
  try{
    var k='cd_puzzle_state_v1';
    var s=JSON.parse(localStorage.getItem(k)||'{}');
    if(!s.started_at) s.started_at=Date.now();
    s.signal_at=s.signal_at||Date.now();
    s.steps_completed=s.steps_completed||[];
    if(!s.steps_completed.includes('L5_signal')) s.steps_completed.push('L5_signal');
    s.tokens=s.tokens||{};
    if(TOKEN && TOKEN.indexOf('__LEVEL')!==0) s.tokens.L5_signal=TOKEN;
    localStorage.setItem(k,JSON.stringify(s));
  }catch(e){}
  console.log('%c· L5/06 · signal label reached · fetch /signal.json','color:#8EE000;font-family:monospace;font-size:11px');
})();
</script>
</body>
</html>
